<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">2026 後半年工作藍圖示意圖</title>
  <desc id="desc">三條工作主線連結到好理家在、馴錢師沙盒、AI agent 與夥伴配置。</desc>
  <defs>
    <style>
      .bg{fill:#f4f7f3}
      .panel{fill:#fff;stroke:#d9e1dc;stroke-width:2}
      .ink{fill:#17323a}
      .muted{fill:#536168}
      .teal{fill:#1f7a7a}
      .brick{fill:#b65043}
      .gold{fill:#b7791f}
      .green{fill:#3d7b45}
      .blue{fill:#3b6ea8}
      .line{fill:none;stroke:#b8c8c1;stroke-width:4;stroke-linecap:round}
      text{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;letter-spacing:0}
      .small{font-size:22px;font-weight:700}
      .label{font-size:28px;font-weight:900}
      .title{font-size:34px;font-weight:900}
    </style>
  </defs>
  <rect class="bg" width="960" height="620" rx="24"/>
  <rect class="panel" x="44" y="44" width="872" height="532" rx="18"/>

  <path class="line" d="M480 190 C360 210 288 276 232 360"/>
  <path class="line" d="M480 190 C484 285 484 346 484 442"/>
  <path class="line" d="M480 190 C600 210 672 276 728 360"/>
  <path class="line" d="M232 360 C312 444 390 480 484 502"/>
  <path class="line" d="M728 360 C650 444 574 480 484 502"/>

  <circle cx="480" cy="162" r="96" fill="#17323a"/>
  <text x="480" y="142" text-anchor="middle" fill="#fff" class="small">2026 H2</text>
  <text x="480" y="180" text-anchor="middle" fill="#fff" class="title">工作藍圖</text>

  <g>
    <rect x="98" y="292" width="268" height="150" rx="16" fill="#e9f5f3" stroke="#b7d9d5" stroke-width="2"/>
    <circle cx="136" cy="336" r="18" class="teal"/>
    <text x="168" y="346" class="label ink">好理家在</text>
    <text x="136" y="392" class="small muted">經營、頁面、內容、工具</text>
  </g>

  <g>
    <rect x="594" y="292" width="268" height="150" rx="16" fill="#fff0ec" stroke="#efc3ba" stroke-width="2"/>
    <circle cx="632" cy="336" r="18" class="brick"/>
    <text x="664" y="346" class="label ink">馴錢師沙盒</text>
    <text x="632" y="392" class="small muted">課務、講師、FAQ、審稿</text>
  </g>

  <g>
    <rect x="322" y="430" width="324" height="104" rx="16" fill="#edf3fb" stroke="#c6d8ef" stroke-width="2"/>
    <circle cx="360" cy="476" r="18" class="blue"/>
    <text x="392" y="486" class="label ink">AI Agent 應用</text>
    <text x="360" y="520" class="small muted">整理、驗證、草擬、發布檢查</text>
  </g>

  <g>
    <rect x="118" y="92" width="152" height="74" rx="14" fill="#fff8e9" stroke="#efd39f" stroke-width="2"/>
    <text x="194" y="123" text-anchor="middle" class="small ink">Kevin</text>
    <text x="194" y="151" text-anchor="middle" font-size="18" fill="#536168">策略決策</text>
  </g>
  <g>
    <rect x="690" y="92" width="152" height="74" rx="14" fill="#eef7ef" stroke="#b7d7bb" stroke-width="2"/>
    <text x="766" y="123" text-anchor="middle" class="small ink">奕吟</text>
    <text x="766" y="151" text-anchor="middle" font-size="18" fill="#536168">頁面協作</text>
  </g>
  <g>
    <rect x="104" y="496" width="172" height="62" rx="14" fill="#fff" stroke="#d9e1dc" stroke-width="2"/>
    <text x="190" y="536" text-anchor="middle" class="small ink">工讀生任務卡</text>
  </g>
  <g>
    <rect x="684" y="496" width="178" height="62" rx="14" fill="#fff" stroke="#d9e1dc" stroke-width="2"/>
    <text x="773" y="536" text-anchor="middle" class="small ink">辦公室需求</text>
  </g>

  <path d="M270 129 C342 124 386 135 418 154" class="line"/>
  <path d="M690 129 C618 124 574 135 542 154" class="line"/>
  <path d="M276 526 C310 523 330 513 350 494" class="line"/>
  <path d="M684 526 C646 523 626 513 604 494" class="line"/>

  <rect x="376" y="74" width="208" height="36" rx="18" class="gold"/>
  <text x="480" y="100" text-anchor="middle" fill="#fff" font-size="20" font-weight="900">先做小、再驗證、再固定化</text>
</svg>
