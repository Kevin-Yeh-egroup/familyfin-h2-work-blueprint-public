<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 520" role="img" aria-labelledby="title desc">
  <title id="title">2026 後半年手機版工作藍圖示意圖</title>
  <desc id="desc">手機版用直向結構呈現 Kevin、奕吟、好理家在、馴錢師沙盒、AI agent、工讀生與辦公室需求的關係。</desc>
  <defs>
    <style>
      .bg{fill:#f4f7f3}
      .panel{fill:#fff;stroke:#d9e1dc;stroke-width:2}
      .ink{fill:#17323a}
      .muted{fill:#536168}
      .teal{fill:#1f7a7a}
      .brick{fill:#b65043}
      .gold{fill:#b7791f}
      .green{fill:#3d7b45}
      .blue{fill:#3b6ea8}
      .line{fill:none;stroke:#b8c8c1;stroke-width:3;stroke-linecap:round}
      text{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;letter-spacing:0}
      .small{font-size:13px;font-weight:700}
      .label{font-size:18px;font-weight:900}
      .title{font-size:22px;font-weight:900}
    </style>
  </defs>
  <rect class="bg" width="390" height="520" rx="20"/>
  <rect class="panel" x="20" y="20" width="350" height="480" rx="16"/>

  <rect x="82" y="48" width="96" height="50" rx="12" fill="#fff8e9" stroke="#efd39f" stroke-width="2"/>
  <text x="130" y="70" text-anchor="middle" class="small ink">Kevin</text>
  <text x="130" y="88" text-anchor="middle" font-size="11" fill="#536168">策略決策</text>

  <rect x="212" y="48" width="96" height="50" rx="12" fill="#eef7ef" stroke="#b7d7bb" stroke-width="2"/>
  <text x="260" y="70" text-anchor="middle" class="small ink">奕吟</text>
  <text x="260" y="88" text-anchor="middle" font-size="11" fill="#536168">頁面協作</text>

  <circle cx="195" cy="155" r="58" fill="#17323a"/>
  <rect x="145" y="104" width="100" height="28" rx="14" class="gold"/>
  <text x="195" y="123" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">做小、驗證、固定</text>
  <text x="195" y="148" text-anchor="middle" fill="#fff" class="small">2026 H2</text>
  <text x="195" y="176" text-anchor="middle" fill="#fff" class="title">工作藍圖</text>

  <path d="M151 98 C154 120 163 132 180 142" class="line"/>
  <path d="M239 98 C236 120 227 132 210 142" class="line"/>

  <path d="M195 213 C195 228 195 240 195 250" class="line"/>
  <path d="M150 244 C158 232 169 223 184 214" class="line"/>
  <path d="M240 244 C232 232 221 223 206 214" class="line"/>

  <rect x="44" y="240" width="132" height="88" rx="14" fill="#e9f5f3" stroke="#b7d9d5" stroke-width="2"/>
  <circle cx="66" cy="268" r="11" class="teal"/>
  <text x="84" y="274" class="label ink">好理家在</text>
  <text x="66" y="302" class="small muted">經營、頁面</text>
  <text x="66" y="320" class="small muted">內容、工具</text>

  <rect x="214" y="240" width="132" height="88" rx="14" fill="#fff0ec" stroke="#efc3ba" stroke-width="2"/>
  <circle cx="236" cy="268" r="11" class="brick"/>
  <text x="254" y="274" class="label ink">馴錢師</text>
  <text x="236" y="302" class="small muted">課務、講師</text>
  <text x="236" y="320" class="small muted">FAQ、審稿</text>

  <path d="M110 328 C128 360 154 376 184 386" class="line"/>
  <path d="M280 328 C262 360 236 376 206 386" class="line"/>

  <rect x="72" y="376" width="246" height="70" rx="14" fill="#edf3fb" stroke="#c6d8ef" stroke-width="2"/>
  <circle cx="96" cy="408" r="11" class="blue"/>
  <text x="116" y="414" class="label ink">AI Agent 應用</text>
  <text x="96" y="436" class="small muted">整理、驗證、草擬、發布檢查</text>

  <rect x="44" y="452" width="132" height="36" rx="10" fill="#fff" stroke="#d9e1dc" stroke-width="2"/>
  <text x="110" y="475" text-anchor="middle" class="small ink">工讀生任務卡</text>
  <rect x="214" y="452" width="132" height="36" rx="10" fill="#fff" stroke="#d9e1dc" stroke-width="2"/>
  <text x="280" y="475" text-anchor="middle" class="small ink">辦公室需求</text>
</svg>
